name: CI Auto Test

# Trigger on pushes to main and pull requests targeting main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-nvidia:
    uses: ./.github/workflows/backend-test.yaml
    with:
      vendor: 'nvidia'
      # The label must match the configured self-hosted runner label.
      runner_label: 'self-hosted-nvidia'
      # GPU check script path
      gpu_check_script: 'tools/check_nvidia_gpu.sh'
      # Test script path
      test_script: 'tools/run_tests.sh'
